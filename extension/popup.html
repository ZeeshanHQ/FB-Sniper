<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #17171a;
      --border: #2e2e33;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
      --error: #ef4444;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 320px;
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 1.25rem;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--primary), #60a5fa);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.875rem;
      color: white;
    }
    .title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.375rem;
    }
    input {
      width: 100%;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      color: var(--text);
      font-size: 0.8125rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--primary);
    }
    button {
      width: 100%;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.625rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: var(--primary-hover);
    }
    button:disabled {
      background-color: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .status-box {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 0.375rem;
      font-size: 0.75rem;
      line-height: 1.4;
      display: none;
    }
    .status-box.success {
      display: block;
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--success);
    }
    .status-box.error {
      display: block;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--error);
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <title>Astraventa Sniper Helper</title>
</head>
<body>
  <div class="header">
    <div class="logo">A</div>
    <div class="title">Astraventa FB Sniper</div>
  </div>

  <div class="form-group">
    <label for="serverUrl">API SERVER URL</label>
    <input type="text" id="serverUrl" placeholder="https://fb-sniper-api.onrender.com">
  </div>

  <div class="form-group">
    <label for="userId">ASTRAVENTA USER ID</label>
    <input type="text" id="userId" placeholder="Copy User ID from dashboard settings">
  </div>

  <button id="connectBtn">Connect Facebook Account</button>

  <div id="statusBox" class="status-box"></div>

  <script src="popup.js"></script>
</body>
</html>
